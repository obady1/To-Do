<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Tasks — Smart Task Management</title>

    <!-- Professional Arabic Font from Google Fonts -->

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link href="style.css" rel="stylesheet" />

    <script src="index.js" defer></script>
  </head>

  <body>
    <!-- Main Container -->

    <main class="app-container">
      <!-- Header: Brand and Night Mode Button -->

      <header class="app-header">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">
            <!-- To-Do List Icon -->

            <svg viewBox="0 0 24 24">
              <path d="M9 11l3 3L22 4" />

              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
            </svg>
          </div>

          <div class="brand-text">
            <h1>My Tasks</h1>

            <p>Organize Your Day Smart</p>
          </div>
        </div>

        <button
          class="theme-toggle"
          id="themeToggle"
          aria-label="Toggle Night Mode"
          title="Toggle Night Mode"
        >
          <svg class="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5" />

            <line x1="12" y1="1" x2="12" y2="3" />

            <line x1="12" y1="21" x2="12" y2="23" />

            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />

            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />

            <line x1="1" y1="12" x2="3" y2="12" />

            <line x1="21" y1="12" x2="23" y2="12" />

            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />

            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>

          <svg class="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>
      </header>

      <!-- Task Input Card -->

      <section class="input-card">
        <div class="input-wrapper">
          <input
            type="text"
            class="task-input"
            id="taskInput"
            placeholder="Add a new task..."
            maxlength="200"
            autocomplete="off"
            aria-label="New task text"
          />

          <button class="add-btn" id="addBtn" aria-label="Add task">
            <svg viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add
          </button>
        </div>

        <!-- Error message -->

        <div class="error-msg" id="errorMsg" role="alert">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
          </svg>

          <span id="errorText"></span>
        </div>
      </section>

      <!-- Search and Filter Bar -->

      <section class="controls-bar">
        <div class="search-box">
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Search your tasks..."
            autocomplete="off"
            aria-label="Search Tasks"
          />

          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />

            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
        <div class="filter-row">
          <nav class="filter-tabs" role="tablist" aria-label="Filtering tasks">
            <button
              class="filter-tab active"
              data-filter="all"
              role="tab"
              aria-selected="true"
            >
              All
            </button>
            <button
              class="filter-tab"
              data-filter="pending"
              role="tab"
              aria-selected="false"
            >
              In progress
            </button>
            <button
              class="filter-tab"
              data-filter="completed"
              role="tab"
              aria-selected="false"
            >
              Completed
            </button>
          </nav>
          <div class="stats-badge">
            <span>Remaining</span>
            <span class="count" id="pendingCount">0</span>
          </div>
        </div>
      </section>

      <!-- Progress Bar -->

      <div class="progress-bar-wrapper" id="progressWrapper">
        <div class="progress-info">
          <span class="progress-label">Total Progress</span>

          <span class="progress-percent" id="progressPercent">0%</span>
        </div>

        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Task List -->

      <section
        class="tasks-list"
        id="tasksList"
        aria-label="Task List"
        role="list"
      ></section>

      <!-- Footer Bar: Stats & Delete All -->

      <footer class="footer-bar" id="footerBar" style="display: none">
        <div class="footer-stats">
          <div class="stat-item">
            <span class="dot pending"></span>

            Pending: <strong id="footerPending">0</strong>
          </div>

          <div class="stat-item">
            <span class="dot done"></span>

            Completed: <strong id="footerCompleted">0</strong>
          </div>
        </div>

        <button
          class="clear-all-btn"
          id="clearAllBtn"
          aria-label="Delete All Tasks"
        >
          <svg viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6" />

            <path
              d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"
            />
          </svg>
          Delete All
        </button>
      </footer>
    </main>

    <!-- Toast Container -->

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  </body>
</html>
