<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهامي — إدارة المهام الذكية</title>
    <!-- خط عربي احترافي من Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

</head>
<body>

    <!-- الحاوية الرئيسية -->
    <main class="app-container">

        <!-- الهيدر: العلامة التجارية وزر الوضع الليلي -->
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon" aria-hidden="true">
                    <!-- أيقونة قائمة مهام -->
                    <svg viewBox="0 0 24 24">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>مهامي</h1>
                    <p>نظّم يومك بذكاء</p>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع الليلي" title="تبديل الوضع الليلي">
                <svg class="icon-sun" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
            </button>
        </header>

        <!-- بطاقة إدخال المهمة -->
        <section class="input-card">
            <div class="input-wrapper">
                <input
                    type="text"
                    class="task-input"
                    id="taskInput"
                    placeholder="أضف مهمة جديدة..."
                    maxlength="200"
                    autocomplete="off"
                    aria-label="نص المهمة الجديدة"
                >
                <button class="add-btn" id="addBtn" aria-label="إضافة المهمة">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    إضافة
                </button>
            </div>
            <!-- رسالة الخطأ -->
            <div class="error-msg" id="errorMsg" role="alert">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <span id="errorText"></span>
            </div>
        </section>

        <!-- شريط البحث والفلترة -->
        <section class="controls-bar">
            <div class="search-box">
                <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="ابحث في مهامك..."
                    autocomplete="off"
                    aria-label="البحث في المهام"
                >
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
            <div class="filter-row">
                <nav class="filter-tabs" role="tablist" aria-label="فلترة المهام">
                    <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true">الكل</button>
                    <button class="filter-tab" data-filter="pending" role="tab" aria-selected="false">قيد التنفيذ</button>
                    <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false">مكتملة</button>
                </nav>
                <div class="stats-badge">
                    <span>المتبقي</span>
                    <span class="count" id="pendingCount">0</span>
                </div>
            </div>
        </section>

        <!-- شريط التقدم -->
        <div class="progress-bar-wrapper" id="progressWrapper">
            <div class="progress-info">
                <span class="progress-label">التقدم الإجمالي</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- قائمة المهام -->
        <section class="tasks-list" id="tasksList" aria-label="قائمة المهام" role="list"></section>

        <!-- شريط التذييل: إحصائيات وحذف الكل -->
        <footer class="footer-bar" id="footerBar" style="display: none;">
            <div class="footer-stats">
                <div class="stat-item">
                    <span class="dot pending"></span>
                    قيد التنفيذ: <strong id="footerPending">0</strong>
                </div>
                <div class="stat-item">
                    <span class="dot done"></span>
                    مكتملة: <strong id="footerCompleted">0</strong>
                </div>
            </div>
            <button class="clear-all-btn" id="clearAllBtn" aria-label="حذف جميع المهام">
                <svg viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
                حذف الكل
            </button>
        </footer>

    </main>

    <!-- حاوية رسائل التوست -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    
</body>
</html>
